<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 工具演示 - 文件浏览器 & 计算器</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; }
        .dashboard { max-width: 1400px; width: 100%; display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
        .card { background: rgba(255,255,255,0.92); backdrop-filter: blur(4px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); padding: 1.8rem 2rem; flex: 1; min-width: 320px; }
        h2 { margin-top: 0; font-weight: 700; font-size: 1.8rem; background: linear-gradient(135deg, #1f3b4c, #2c6285); background-clip: text; -webkit-background-clip: text; color: transparent; border-left: 5px solid #2c7da0; padding-left: 1rem; margin-bottom: 1.5rem; }
        .btn { background: #2c7da0; border: none; color: white; font-weight: 600; padding: 10px 24px; border-radius: 60px; cursor: pointer; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #1f5e7a; transform: scale(1.02); }
        .path-input { display: flex; gap: 10px; margin: 1rem 0; align-items: center; flex-wrap: wrap; }
        .path-input input { flex: 1; padding: 10px 16px; border-radius: 48px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        .file-list { background: #f8fafd; border-radius: 1.5rem; padding: 0.6rem; margin: 1.2rem 0; max-height: 420px; overflow-y: auto; border: 1px solid #e2edf2; }
        .file-item { padding: 8px 12px; border-bottom: 1px solid #e0e9ef; display: flex; align-items: center; gap: 12px; word-break: break-all; }
        .file-icon { font-size: 1.2rem; }
        .calc-group { display: flex; gap: 14px; flex-wrap: wrap; margin: 1.2rem 0; align-items: center; }
        .calc-group input, .calc-group select { padding: 10px 16px; border-radius: 48px; border: 1px solid #cbd5e1; flex: 1; }
        .result-area { background: #eef3fa; border-radius: 1.2rem; padding: 1rem 1.4rem; margin-top: 1.8rem; border-left: 5px solid #2c7da0; }
        .error { background: #ffe8e6; border-left-color: #c7362b; color: #a1221a; }
        .loading-btn { opacity: 0.65; pointer-events: none; }
        footer { text-align: center; width: 100%; margin-top: 24px; font-size: 0.8rem; color: #4a5b6e; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="card">
        <h2>📂 文件浏览器</h2>
        <div class="path-input">
            <input type="text" id="folderPath" placeholder="输入文件夹路径，留空则使用默认桌面" value="">
            <button class="btn" id="refreshBtn">🔍 浏览</button>
        </div>
        <div class="file-list" id="fileListArea">✨ 输入路径或点击浏览</div>
        <div class="result-area" id="fileMsgArea">💡 支持任意路径（如 D:\\work 或 C:\\Users）</div>
    </div>
    <div class="card">
        <h2>🧮 智能计算器</h2>
        <div class="calc-group">
            <input type="number" id="numA" placeholder="数字 A" value="12">
            <select id="opSelect">
                <option value="+">加法 (+)</option>
                <option value="-">减法 (-)</option>
                <option value="*">乘法 (*)</option>
                <option value="/">除法 (/)</option>
            </select>
            <input type="number" id="numB" placeholder="数字 B" value="4">
        </div>
        <button class="btn" id="calcActionBtn">⚡ 计算结果</button>
        <div class="result-area" id="calcResultArea">📐 等待计算</div>
    </div>
    <footer>⚙️ MCP 桥接服务 | 文件浏览直接读取磁盘，计算器通过 MCP 调用</footer>
</div>
<script>
    const API_BASE = 'http://127.0.0.1:8000';   // 桥接服务地址
    async function apiCall(url, options={}) {
        const res = await fetch(url, { headers:{'Content-Type':'application/json'}, ...options });
        if(!res.ok){ let err=''; try{ const e=await res.json(); err=e.detail; }catch{ err=await res.text(); } throw new Error(err||res.statusText); }
        return res.json();
    }
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': '&gt;'); }
    async function loadFiles(){
        const container=document.getElementById('fileListArea');
        const msgDiv=document.getElementById('fileMsgArea');
        const btn=document.getElementById('refreshBtn');
        let path=document.getElementById('folderPath').value.trim();
        btn.classList.add('loading-btn');
        const orig=btn.innerHTML;
        btn.innerHTML='⏳ 加载中...';
        msgDiv.innerHTML='⏳ 正在读取目录...';
        msgDiv.classList.remove('error');
        try{
            let url=`${API_BASE}/desktop-files`;
            if(path) url+=`?path=${encodeURIComponent(path)}`;
            const result=await apiCall(url);
            if(result.success){
                const data=result.data;
                if(Array.isArray(data)){
                    if(data.length===0) container.innerHTML='<div class="file-item">📭 目录为空</div>';
                    else{
                        container.innerHTML=data.map(f=>`<div class="file-item"><span class="file-icon">${f.includes('.')?'📄':'📁'}</span><span class="file-name">${escapeHtml(f)}</span></div>`).join('');
                    }
                    msgDiv.innerHTML=`✅ 当前路径: ${result.current_path || path || '默认桌面'} (${data.length} 项)`;
                } else if(typeof data==='string'){
                    container.innerHTML='<div class="file-item">⚠️ 错误</div>';
                    msgDiv.innerHTML=`❌ ${escapeHtml(data)}`;
                    msgDiv.classList.add('error');
                } else throw new Error('数据格式异常');
            } else throw new Error('请求失败');
        }catch(err){
            container.innerHTML='<div class="file-item">❌ 加载失败</div>';
            msgDiv.innerHTML=`❌ 错误: ${escapeHtml(err.message)}`;
            msgDiv.classList.add('error');
        }finally{
            btn.classList.remove('loading-btn');
            btn.innerHTML=orig;
        }
    }
    async function calc(){
        const a=parseFloat(document.getElementById('numA').value);
        const b=parseFloat(document.getElementById('numB').value);
        const op=document.getElementById('opSelect').value;
        const resultDiv=document.getElementById('calcResultArea');
        const btn=document.getElementById('calcActionBtn');
        if(isNaN(a)||isNaN(b)){ resultDiv.innerHTML='⚠️ 请输入有效数字'; resultDiv.classList.add('error'); return; }
        btn.classList.add('loading-btn');
        const orig=btn.innerHTML;
        btn.innerHTML='⏳ 计算中...';
        resultDiv.innerHTML='📡 调用 MCP calculator...';
        resultDiv.classList.remove('error');
        try{
            const res=await apiCall(`${API_BASE}/calculate`,{ method:'POST', body:JSON.stringify({a,b,operator:op}) });
            if(res.success){
                let val=res.data;
                if(typeof val==='number') val=Number.isInteger(val)?val:parseFloat(val.toFixed(8));
                resultDiv.innerHTML=`🧾 ${a} ${op} ${b} = <strong>${val}</strong>`;
            } else throw new Error(res.detail||'计算失败');
        }catch(err){
            resultDiv.innerHTML=`❌ 计算错误: ${escapeHtml(err.message)}`;
            resultDiv.classList.add('error');
        }finally{
            btn.classList.remove('loading-btn');
            btn.innerHTML=orig;
        }
    }
    document.getElementById('refreshBtn').addEventListener('click', loadFiles);
    document.getElementById('calcActionBtn').addEventListener('click', calc);
    loadFiles(); // 自动加载默认桌面
</script>
</body>
</html>
